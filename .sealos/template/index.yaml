apiVersion: app.sealos.io/v1
kind: Template
metadata:
  name: gpu-maestro-ui
spec:
  title: 'GPU Maestro UI'
  description: 'Deploy the GPU Maestro Next.js frontend to Sealos Cloud.'
  locale: en
  i18n:
    zh:
      description: '将 GPU Maestro Next.js 前端部署到 Sealos Cloud。'
  defaults:
    app_name:
      type: string
      value: gpu-maestro-ui-${{ random(8) }}
    app_host:
      type: string
      value: gpu-maestro-ui-${{ random(8) }}
  inputs:
    image_ref:
      description: 'OCI image reference to deploy'
      type: string
      default: 'ghcr.io/felixqiu014-wq/gpu-maestro-ui:20260414-123531'
      required: true
  templateType: inline
  resourceTemplates:
    - apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ${{ defaults.app_name }}
        labels:
          app: ${{ defaults.app_name }}
          cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
      spec:
        replicas: 1
        revisionHistoryLimit: 1
        selector:
          matchLabels:
            app: ${{ defaults.app_name }}
        template:
          metadata:
            labels:
              app: ${{ defaults.app_name }}
              cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
          spec:
            automountServiceAccountToken: false
            imagePullSecrets:
              - name: ${{ defaults.app_name }}
            containers:
              - name: app
                image: ${{ inputs.image_ref }}
                imagePullPolicy: IfNotPresent
                ports:
                  - containerPort: 3000
                env:
                  - name: NODE_ENV
                    value: production
                  - name: PORT
                    value: "3000"
                  - name: HOSTNAME
                    value: 0.0.0.0
                resources:
                  requests:
                    cpu: 20m
                    memory: 25Mi
                  limits:
                    cpu: 200m
                    memory: 256Mi
    - apiVersion: v1
      kind: Service
      metadata:
        name: ${{ defaults.app_name }}
        labels:
          cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
      spec:
        selector:
          app: ${{ defaults.app_name }}
        ports:
          - port: 80
            targetPort: 3000
    - apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: ${{ defaults.app_name }}
        labels:
          cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
      spec:
        ingressClassName: nginx
        tls:
          - hosts:
              - ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
            secretName: ${{ SEALOS_CERT_SECRET_NAME }}
        rules:
          - host: ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: ${{ defaults.app_name }}
                      port:
                        number: 80
    - apiVersion: app.sealos.io/v1
      kind: App
      metadata:
        name: ${{ defaults.app_name }}
        labels:
          cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
      spec:
        data:
          url: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
        displayType: normal
        icon: https://cdn.jsdelivr.net/gh/selfhst/icons/png/nextjs.png
        name: GPU Maestro UI
        type: link
